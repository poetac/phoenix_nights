name: Rebuild data assets

# The precomputed JSON under apps/web/public/data/ is committed to the repo and
# served verbatim, so it silently goes stale once a new year completes. This job
# re-runs the analysis pipelines against the official record (ACIS / NCEI / EIA
# are all reachable from Actions) and commits any refreshed assets. Run it by
# hand after shipping a pipeline change, or let the monthly schedule catch the
# year rollover.

on:
  workflow_dispatch:
  schedule:
    # 09:00 UTC on the 5th of each month — picks up the previous year a few days
    # after it closes, and is a no-op (no commit) the rest of the time.
    - cron: "0 9 5 * *"

permissions:
  contents: write        # push the refresh branch
  pull-requests: write   # open the PR (replaces the old push-to-main + deploy dispatch)

jobs:
  rebuild:
    runs-on: ubuntu-latest
    env:
      EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ACIS-only builders — no API key, cheap, the ones that go stale yearly.
      - name: Rebuild ACIS-derived assets
        run: |
          for city in phx tus lv ep yum rno abq slc boi atl hou nola rdu dfw; do
            python3 analysis/build_streaks.py --city "$city"
            python3 analysis/build_heat_season.py --city "$city"
            python3 analysis/build_normals.py --city "$city"
            python3 analysis/build_cdd_split.py --city "$city"
          done

      # Heavy NCEI hourly pull; rarely changes. Best-effort, never blocks.
      - name: Rebuild diurnal asset (NCEI hourly)
        continue-on-error: true
        run: |
          for city in phx tus lv ep yum rno abq slc boi atl hou nola rdu dfw; do
            python3 analysis/build_diurnal.py --city "$city"
          done

      # Needs the EIA_API_KEY secret; skipped (not failed) when it isn't set.
      - name: Rebuild grid asset (EIA-930)
        if: ${{ env.EIA_API_KEY != '' }}
        continue-on-error: true
        run: |
          for city in phx tus lv ep abq boi; do
            python3 analysis/build_grid.py --city "$city"
          done

      # International (GHCN/GSOY) cities: ACIS is US-only, so precompute the yearly
      # series the front end can't fetch live for them.
      - name: Rebuild international series (NCEI GSOY)
        run: |
          for city in syd dbt; do
            python3 analysis/build_series.py --city "$city"
          done

      # Rank each city's facts (reads the committed assets + live ACIS/GSOY); one run, all cities.
      - name: Rebuild per-city facts (salience engine)
        run: python3 analysis/build_facts.py

      - name: Rebuild cross-city comparison series
        run: python3 analysis/build_compare.py

      # Gate: don't commit anything if the headline numbers stopped checking out.
      - name: Verify statistics against the official record
        run: python3 analysis/verify_v0.py

      # Open a PR with the refreshed assets instead of pushing straight to the
      # deployed branch. The verify step above is the automated gate (headline
      # numbers + asset finiteness); a human squash-merge is the review gate, and
      # merging to main triggers pages.yml (on push) to deploy — so an unattended
      # cron run can no longer publish unreviewed, upstream-derived bytes to prod.
      - name: Open a PR with refreshed assets if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE: ${{ github.ref_name }}
        run: |
          git config user.name "phoenix-nights-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- apps/web/public/data; then
            echo "No asset changes."
            exit 0
          fi
          BRANCH="auto/refresh-data-$(date +%Y%m%d-%H%M%S)"
          git switch -c "$BRANCH"
          git add apps/web/public/data
          git commit -m "Refresh precomputed data assets from the official record"
          git push origin "$BRANCH"
          gh pr create --base "$BASE" --head "$BRANCH" \
            --title "Refresh precomputed data assets from the official record" \
            --body "Automated monthly/dispatch refresh from ACIS / NCEI / EIA, gated by verify_v0.py (headline numbers + asset finiteness). Review and squash-merge to deploy."
