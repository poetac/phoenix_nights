name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      # Two products, one Pages artifact. The explorer ships at the site root
      # (https://<owner>.github.io/phoenix_nights/); Desert Nights ships at the
      # /desert/ subpath, built into dist/desert so a single deploy serves both.
      # Order matters: build the explorer first (it empties dist/), then the
      # desert build writes into dist/desert without disturbing it.
      - run: npm run build -- --base=/phoenix_nights/
        working-directory: apps/web
      - run: VITE_PRODUCT=desert npm run build -- --base=/phoenix_nights/desert/ --outDir dist/desert
        working-directory: apps/web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist
      - id: deployment
        uses: actions/deploy-pages@v4
