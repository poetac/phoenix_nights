name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  verify-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify app statistics against NCEI GSOY
        run: python3 analysis/verify_v0.py
