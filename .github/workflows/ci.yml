name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: fork PRs run author-controlled npm ci / tests, so cap the
# GITHUB_TOKEN to read regardless of the repo's default token setting. The
# artifact upload uses the Actions API, not contents, so this is sufficient.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      # pure-logic unit tests — the net under the numbers the smoke test can't check:
      # units conversion, the OLS/bootstrap stats, the freshness/staleness logic, and
      # the sign/direction prose formatters (the recurring "wrong direction word" class)
      - run: node tests/units.test.mjs
      - run: node tests/stats.test.mjs
      - run: node tests/freshness.test.mjs
      - run: node tests/format.test.mjs
      # the two city registries (cities.js front-end / cities.py pipelines) are
      # hand-kept copies of one truth and drift — that drift orphaned boi's diurnal
      # config (#98). Assert they agree on the city set, ids, rural pair, and opt-ins.
      - run: node tests/registry.test.mjs
      # the same net, other language: the builders' pure logic (streak/season
      # spans, the CDD split identity) — offline, no ACIS, the layer where the
      # missing-high-vs-observed-low bug class lives. unittest is stdlib and the
      # runner ships python3, so no setup-python needed; run from the repo root.
      - name: Python builder unit tests
        working-directory: ${{ github.workspace }}
        run: python3 -m unittest discover -s analysis/tests
      - run: npm run build
      # both products must build (explorer is default; desert is the second site)
      - run: npm run build:desert

  verify-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify app statistics against NCEI GSOY
        run: python3 analysis/verify_v0.py

  render:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install Playwright (chromium + system deps)
        run: npm i --no-save playwright && npx playwright install --with-deps chromium
      - name: Serve build and run render smoke test
        run: |
          python3 -m http.server 8099 --directory dist >/tmp/srv.log 2>&1 &
          SRV=$!
          sleep 2
          BASE_URL=http://localhost:8099 node tests/render-smoke.mjs
          STATUS=$?
          kill $SRV 2>/dev/null || true
          exit $STATUS
      - name: Upload render screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-screenshots
          path: apps/web/tests/__screens__/
          if-no-files-found: ignore
