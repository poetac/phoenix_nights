name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      # units layer conversion math (render smoke checks cards mount, not temp strings)
      - run: node tests/units.test.mjs
      - run: npm run build
      # both products must build (explorer is default; desert is the second site)
      - run: npm run build:desert

  verify-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify app statistics against NCEI GSOY
        run: python3 analysis/verify_v0.py

  render:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Install Playwright (chromium + system deps)
        run: npm i --no-save playwright && npx playwright install --with-deps chromium
      - name: Serve build and run render smoke test
        run: |
          python3 -m http.server 8099 --directory dist >/tmp/srv.log 2>&1 &
          SRV=$!
          sleep 2
          BASE_URL=http://localhost:8099 node tests/render-smoke.mjs
          STATUS=$?
          kill $SRV 2>/dev/null || true
          exit $STATUS
      - name: Upload render screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-screenshots
          path: apps/web/tests/__screens__/
          if-no-files-found: ignore
