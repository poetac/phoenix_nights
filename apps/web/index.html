<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#141021" />
    <meta name="color-scheme" content="dark" />
    <!-- Per-product meta: tokens below are filled at build time by the productMeta()
         plugin in vite.config.js, keyed on VITE_PRODUCT (City Signals at the root,
         Desert Nights at /desert/). -->
    <link rel="canonical" href="__META_URL__" />

    <title>__META_TITLE__</title>
    <meta name="description" content="__META_DESC__" />

    <!-- Open Graph / social cards -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="__META_SITENAME__" />
    <meta property="og:title" content="__META_OGTITLE__" />
    <meta property="og:description" content="__META_OGDESC__" />
    <meta property="og:url" content="__META_URL__" />
    <meta property="og:image" content="__META_OGIMAGE_URL__" />
    <meta property="og:image:type" content="__META_OGIMAGE_TYPE__" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="__META_OGALT__" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="__META_OGTITLE__" />
    <meta name="twitter:description" content="__META_OGDESC__" />
    <meta name="twitter:image" content="__META_OGIMAGE_URL__" />

    <!-- Display font, loaded without blocking first paint; system serif is the fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&display=swap"
      />
    </noscript>
  </head>
  <body style="margin: 0; background: #141021">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
